name: Build Desktop App Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-jar:
    name: Build Backend JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd java/opentron-java/backend
          mvn clean package -DskipTests=true -q
          JAR=$(ls -t target/*-exec.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No exec JAR built"
            exit 1
          fi
          cp "$JAR" /tmp/backend.jar
          ls -lh /tmp/backend.jar

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: /tmp/backend.jar
          retention-days: 1

  build-minimal-jre:
    name: Build Minimal JRE
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Minimal JRE with jlink
        run: |
          JAVA_HOME=$JAVA_HOME_21_X64
          
          $JAVA_HOME/bin/jlink \
            --add-modules java.base,java.logging,java.net.http,java.management,java.naming,java.sql,java.transaction.xa,java.security.jgss,jdk.charsets \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --output /tmp/minimal-jre
          
          du -sh /tmp/minimal-jre
          ls /tmp/minimal-jre/bin | head -5

      - name: Archive JRE
        run: |
          cd /tmp
          tar -czf minimal-jre.tar.gz minimal-jre/
          ls -lh minimal-jre.tar.gz

      - name: Upload JRE
        uses: actions/upload-artifact@v4
        with:
          name: minimal-jre
          path: /tmp/minimal-jre.tar.gz
          retention-days: 1

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: [build-jar, build-minimal-jre]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc

          - os: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin

          - os: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin

          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: /tmp/artifacts

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: /tmp/artifacts

      - name: Setup Sidecar
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/sidecar
          
          # Copy JAR
          cp /tmp/artifacts/backend.jar frontend/src-tauri/sidecar/
          
          # Extract and copy JRE
          cd /tmp/artifacts
          tar -xzf minimal-jre.tar.gz
          mv minimal-jre ../../$GITHUB_WORKSPACE/frontend/src-tauri/sidecar/jre
          
          echo "✓ Sidecar ready"
          du -sh frontend/src-tauri/sidecar

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build

      - name: Build Desktop
        run: |
          cd frontend/src-tauri
          cargo tauri build --target ${{ matrix.target }}

      - name: Verify Installer
        shell: bash
        run: |
          BUNDLE="frontend/src-tauri/target/${{ matrix.target }}/release/bundle"
          ls -lh "$BUNDLE"/*/*.{msi,exe,dmg,AppImage,deb} 2>/dev/null | head -10 || echo "Looking for installers..."
          find "$BUNDLE" -type f -size +10M -exec ls -lh {} \;

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          retention-days: 1

  release:
    name: Create Release
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download Installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect Files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f -size +10M -exec cp {} release/ \;
          cd release
          sha256sum * > CHECKSUMS.sha256
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          body: |
            # OpenTron v${{ github.ref_name }}
            
            **Production-ready desktop app - everything bundled, zero setup.**
            
            ## Download
            - Windows: `OpenTron.msi` or `OpenTron.exe`
            - macOS Intel: `OpenTron-x86_64.dmg`
            - macOS ARM: `OpenTron-arm64.dmg`
            - Linux: `OpenTron.AppImage` or `OpenTron.deb`
            
            ## What's Inside
            ✅ Java 21 Runtime (~50MB)
            ✅ Spring Boot 3.1 Backend
            ✅ React 19 Frontend
            ✅ PostgreSQL Support
            ✅ 6 AI Agents + 14 Connectors
            
            ## Install
            **Windows:** Double-click `.msi`
            **macOS:** Mount `.dmg`, drag to Applications
            **Linux:** `chmod +x OpenTron.AppImage && ./OpenTron.AppImage`
            
            No Java required - everything included.
