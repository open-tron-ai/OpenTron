name: Build Desktop App Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-jar:
    name: Build Backend JAR (H2 Embedded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd java/opentron-java/backend
          echo "Building Spring Boot JAR with H2 embedded database support"
          mvn clean package -DskipTests=true -q
          JAR=$(ls -t target/*-exec.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No exec JAR built"
            ls -la target/
            exit 1
          fi
          cp "$JAR" /tmp/backend.jar
          echo "JAR built successfully"
          ls -lh /tmp/backend.jar
        shell: bash

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: /tmp/backend.jar
          retention-days: 1

  build-minimal-jre:
    name: Build Minimal JRE
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Minimal JRE with jlink
        run: |
          JAVA_HOME="${{ env.JAVA_HOME }}"
          
          $JAVA_HOME/bin/jlink \
            --add-modules java.base,java.logging,java.net.http,java.management,java.naming,java.sql,java.transaction.xa,java.security.jgss,jdk.charsets \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --output /tmp/minimal-jre
          
          SIZE=$(du -sh /tmp/minimal-jre | awk '{print $1}')
          echo "Minimal JRE: $SIZE"
        shell: bash

      - name: Archive JRE
        run: |
          cd /tmp
          tar -czf minimal-jre.tar.gz minimal-jre/
          echo "Archive created: $(ls -lh minimal-jre.tar.gz | awk '{print $5}')"
        shell: bash

      - name: Upload JRE
        uses: actions/upload-artifact@v4
        with:
          name: minimal-jre
          path: /tmp/minimal-jre.tar.gz
          retention-days: 1

  build-desktop-windows:
    name: Build Desktop (Windows)
    needs: [build-jar, build-minimal-jre]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar (Backend + JRE)
        shell: cmd
        run: |
          mkdir frontend\src-tauri\sidecar
          copy backend-download\backend.jar frontend\src-tauri\sidecar\
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          move minimal-jre ..\frontend\src-tauri\sidecar\jre
          echo Sidecar ready

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Frontend
        shell: cmd
        run: |
          cd frontend
          call npm ci --no-audit --no-fund
          call npm run build

      - name: Build Desktop (Windows)
        shell: cmd
        run: |
          cd frontend\src-tauri
          cargo tauri build --target x86_64-pc-windows-msvc

      - name: Verify Installer
        shell: cmd
        run: |
          dir frontend\src-tauri\target\x86_64-pc-windows-msvc\release\bundle /s

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          retention-days: 1
          if-no-files-found: warn

  build-desktop-macos-arm64:
    name: Build Desktop (macOS ARM64)
    needs: [build-jar, build-minimal-jre]
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar (Backend + JRE)
        run: |
          mkdir -p frontend/src-tauri/sidecar
          cp backend-download/backend.jar frontend/src-tauri/sidecar/
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          mv minimal-jre ../frontend/src-tauri/sidecar/jre
          echo "Sidecar ready"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build Frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund 2>&1 | tail -3
          npm run build
        shell: bash

      - name: Build Desktop
        run: |
          cd frontend/src-tauri
          cargo tauri build --target aarch64-apple-darwin 2>&1 | tail -20
        shell: bash

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-arm64
          path: frontend/src-tauri/target/aarch64-apple-darwin/release/bundle/
          retention-days: 1
          if-no-files-found: warn

  build-desktop-macos-x64:
    name: Build Desktop (macOS x64)
    needs: [build-jar, build-minimal-jre]
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar (Backend + JRE)
        run: |
          mkdir -p frontend/src-tauri/sidecar
          cp backend-download/backend.jar frontend/src-tauri/sidecar/
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          mv minimal-jre ../frontend/src-tauri/sidecar/jre
          echo "Sidecar ready"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build Frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund 2>&1 | tail -3
          npm run build
        shell: bash

      - name: Build Desktop
        run: |
          cd frontend/src-tauri
          cargo tauri build --target x86_64-apple-darwin 2>&1 | tail -20
        shell: bash

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-x64
          path: frontend/src-tauri/target/x86_64-apple-darwin/release/bundle/
          retention-days: 1
          if-no-files-found: warn

  build-desktop-linux:
    name: Build Desktop (Linux)
    needs: [build-jar, build-minimal-jre]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar (Backend + JRE)
        run: |
          mkdir -p frontend/src-tauri/sidecar
          cp backend-download/backend.jar frontend/src-tauri/sidecar/
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          mv minimal-jre ../frontend/src-tauri/sidecar/jre
          echo "Sidecar ready"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund 2>&1 | tail -3
          npm run build
        shell: bash

      - name: Build Desktop
        run: |
          cd frontend/src-tauri
          cargo tauri build --target x86_64-unknown-linux-gnu 2>&1 | tail -20
        shell: bash

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: frontend/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/
          retention-days: 1
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: [build-desktop-windows, build-desktop-macos-arm64, build-desktop-macos-x64, build-desktop-linux]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: artifacts/windows

      - name: Download macOS ARM64 Installer
        uses: actions/download-artifact@v4
        with:
          name: installer-macos-arm64
          path: artifacts/macos-arm64
        continue-on-error: true

      - name: Download macOS x64 Installer
        uses: actions/download-artifact@v4
        with:
          name: installer-macos-x64
          path: artifacts/macos-x64
        continue-on-error: true

      - name: Download Linux Installer
        uses: actions/download-artifact@v4
        with:
          name: installer-linux
          path: artifacts/linux
        continue-on-error: true

      - name: Collect & Checksum
        run: |
          mkdir -p release
          find artifacts -type f -size +10M -exec cp {} release/ \;
          cd release
          if [ "$(ls -1 | wc -l)" -gt 0 ]; then
            sha256sum * > CHECKSUMS.sha256 2>/dev/null || true
            echo "=== Collected Installers ==="
            ls -lh
          else
            echo "ERROR: No installers found"
            exit 1
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          body: |
            # OpenTron v${{ github.ref_name }}
            
            Production-ready desktop application. Everything bundled - zero external dependencies.
            
            Download & Install
            
            Windows: Double-click .msi
            macOS: Drag to Applications
            Linux: chmod +x OpenTron.AppImage && ./OpenTron.AppImage
            
            Bundled:
            - Java 21 Runtime (50MB minimal JRE)
            - Spring Boot 3.1 Backend with H2 database
            - React 19 + Tauri Frontend
            - Zero external dependencies
            
            Data stored at ~/.opentron/opentron.h2
