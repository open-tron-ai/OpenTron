name: Build Desktop App Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-jar:
    name: Build Backend JAR (H2 Embedded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with H2 Embedded Profile
        run: |
          cd java/opentron-java/backend
          echo "Building with H2 embedded profile (zero database dependency)"
          mvn clean package -DskipTests=true -Pembedded -q
          JAR=$(ls -t target/*-exec.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No exec JAR built"
            ls -la target/
            exit 1
          fi
          cp "$JAR" /tmp/backend.jar
          echo "✓ JAR built: $(basename $JAR)"
          ls -lh /tmp/backend.jar
        shell: bash
        env:
          SPRING_PROFILES_ACTIVE: embedded

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: /tmp/backend.jar
          retention-days: 1

  build-minimal-jre:
    name: Build Minimal JRE
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Minimal JRE with jlink
        run: |
          JAVA_HOME="${{ env.JAVA_HOME }}"
          
          $JAVA_HOME/bin/jlink \
            --add-modules java.base,java.logging,java.net.http,java.management,java.naming,java.sql,java.transaction.xa,java.security.jgss,jdk.charsets \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --output /tmp/minimal-jre
          
          SIZE=$(du -sh /tmp/minimal-jre | awk '{print $1}')
          echo "✓ Minimal JRE: $SIZE"
          ls /tmp/minimal-jre/bin | wc -l
        shell: bash

      - name: Archive JRE
        run: |
          cd /tmp
          tar -czf minimal-jre.tar.gz minimal-jre/
          echo "✓ Archive created"
          ls -lh minimal-jre.tar.gz
        shell: bash

      - name: Upload JRE
        uses: actions/upload-artifact@v4
        with:
          name: minimal-jre
          path: /tmp/minimal-jre.tar.gz
          retention-days: 1

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: [build-jar, build-minimal-jre]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc

          - os: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin

          - os: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin

          - os: linux
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar (Backend + JRE)
        run: |
          mkdir -p frontend/src-tauri/sidecar
          cp backend-download/backend.jar frontend/src-tauri/sidecar/
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          mv minimal-jre ../frontend/src-tauri/sidecar/jre
          echo "✓ Sidecar ready"
          du -sh ../frontend/src-tauri/sidecar
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Frontend
        run: |
          cd frontend
          npm ci --no-audit --no-fund 2>&1 | tail -3
          npm run build
        shell: bash

      - name: Build Desktop
        run: |
          cd frontend/src-tauri
          cargo tauri build --target ${{ matrix.target }} 2>&1 | tail -20
        shell: bash

      - name: Verify Installer
        run: |
          BUNDLE="frontend/src-tauri/target/${{ matrix.target }}/release/bundle"
          echo "Checking for installers in $BUNDLE..."
          find "$BUNDLE" -type f -size +10M -exec ls -lh {} \; | head -5 || echo "No installers found (check build log above)"
        shell: bash

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 1
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect & Checksum
        run: |
          mkdir -p release
          find artifacts -type f -size +10M -exec cp {} release/ \;
          cd release
          if [ "$(ls -1 | wc -l)" -gt 0 ]; then
            sha256sum * > CHECKSUMS.sha256 2>/dev/null || true
            echo "✓ Release ready:"
            ls -lh
          else
            echo "WARNING: No installers found"
            find ../artifacts -type f | head -20
          fi
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          body: |
            # OpenTron v${{ github.ref_name }}
            
            **Production-ready desktop application. Everything bundled - zero external dependencies.**
            
            ## Download & Install
            
            ### Windows
            - `OpenTron.msi` - Standard installer
            - `OpenTron.exe` - Portable executable
            
            ### macOS
            - `OpenTron-x86_64.dmg` - Intel Macs (10.15+)
            - `OpenTron-arm64.dmg` - Apple Silicon (11.0+)
            
            ### Linux
            - `OpenTron.AppImage` - Universal executable (glibc 2.29+)
            - `OpenTron.deb` - Debian/Ubuntu (18.04+)
            
            ## What's Bundled
            
            ✅ **Java 21 Runtime** (~50MB) - No Java installation needed
            ✅ **Spring Boot 3.1 Backend** - Multi-agent AI orchestration
            ✅ **H2 Embedded Database** - Zero database setup
            ✅ **React 19 + Tauri Frontend** - Native desktop experience
            ✅ **6 AI Agents + 14 Connectors** - Ready-to-use integrations
            ✅ **PostgreSQL Optional** - Switch to PostgreSQL if needed
            ✅ **Cross-platform** - Windows, macOS, Linux
            
            ## Installation (One Click)
            
            **Windows:** Double-click `.msi` and follow wizard
            **macOS:** Mount `.dmg` and drag to Applications
            **Linux AppImage:** `chmod +x OpenTron.AppImage && ./OpenTron.AppImage`
            **Linux DEB:** `sudo dpkg -i OpenTron.deb`
            
            No setup required. Data stored locally in `~/.opentron/` with H2 database.
            
            ## System Requirements
            
            | Platform | Minimum |
            |----------|---------|
            | Windows | 10+ (64-bit) |
            | macOS | 10.15+ (Intel or Apple Silicon) |
            | Linux | glibc 2.29+ (Ubuntu 18.04+, Debian 10+) |
            
            ## Verify Integrity
            
            ```bash
            sha256sum -c CHECKSUMS.sha256
            ```
            
            All files must show `OK`.
            
            ---
            
            Built with Java 21 • Spring Boot 3.1 • React 19 • Tauri • jlink
