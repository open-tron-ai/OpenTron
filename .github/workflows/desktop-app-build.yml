name: Build Desktop App Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-jar:
    name: Build Backend JAR (H2 Embedded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd java/opentron-java/backend
          mvn clean package -DskipTests=true -q
          JAR=$(ls -t target/*-exec.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR built"
            exit 1
          fi
          cp "$JAR" /tmp/backend.jar
        shell: bash

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: /tmp/backend.jar
          retention-days: 1

  build-minimal-jre:
    name: Build Minimal JRE
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Minimal JRE with jlink
        run: |
          JAVA_HOME="${{ env.JAVA_HOME }}"
          $JAVA_HOME/bin/jlink \
            --add-modules java.base,java.logging,java.net.http,java.management,java.naming,java.sql,java.transaction.xa,java.security.jgss,jdk.charsets \
            --strip-debug --no-header-files --no-man-pages --compress=2 \
            --output /tmp/minimal-jre
        shell: bash

      - name: Archive JRE
        run: |
          cd /tmp && tar -czf minimal-jre.tar.gz minimal-jre/
        shell: bash

      - name: Upload JRE
        uses: actions/upload-artifact@v4
        with:
          name: minimal-jre
          path: /tmp/minimal-jre.tar.gz
          retention-days: 1

  build-desktop-windows:
    name: Build Desktop (Windows)
    needs: [build-jar, build-minimal-jre]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar
        run: |
          mkdir frontend\src-tauri\sidecar
          copy backend-download\backend.jar frontend\src-tauri\sidecar\
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          move minimal-jre ..\frontend\src-tauri\sidecar\jre
        shell: cmd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: NPM Install
        run: |
          cd frontend
          npm ci --no-audit --no-fund
        shell: cmd

      - name: TypeScript Compile
        run: |
          cd frontend
          npx tsc -b
        shell: cmd

      - name: Vite Build
        run: |
          cd frontend
          npx vite build --outDir dist
        shell: cmd

      - name: Tauri Build
        run: |
          cd frontend
          npm run tauri build
        shell: cmd

      - name: Upload Installers
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build-desktop-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Installers
        uses: actions/download-artifact@v4
        with:
          name: installers
          path: installers

      - name: Verify Files
        run: |
          echo "Files in installers directory:"
          ls -lh installers/ || echo "No installers directory"
          find . -name "*.msi" -o -name "*.exe" 2>/dev/null || echo "No MSI/EXE found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/*.msi
            installers/*.exe
          draft: false
          body: |
            # OpenTron v${{ github.ref_name }}
            
            Production-ready desktop application - zero external dependencies
            
            **What's Included:**
            - Java 21 Runtime (minimal JRE via jlink)
            - Spring Boot 3.1 Backend with H2 embedded database
            - React 19 + Tauri Frontend
            - 6 AI Agents + 14 Connector Integrations
            
            **Installation:**
            - Windows: Download .msi or .exe and run
            - No Java, Docker, or PostgreSQL required
            
            Data stored locally at: ~/.opentron/opentron.h2
