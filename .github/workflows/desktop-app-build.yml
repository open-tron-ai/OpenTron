name: Build Desktop App Installers (Production)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          components: 'native-image'
          cache: maven

      - name: Build Backend (JAR only)
        run: |
          cd java/opentron-java/backend
          mvn clean package -DskipTests=true -q
          JAR=$(ls target/*.jar | grep -E "exec" | head -1)
          if [ ! -f "$JAR" ]; then
            JAR=$(ls target/*.jar | head -1)
          fi
          SIZE=$(ls -lh "$JAR" | awk '{print $5}')
          echo "✓ JAR built: $(basename $JAR) ($SIZE)"
        shell: bash

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: java/opentron-java/backend/target/*-exec.jar
          retention-days: 1
          if-no-files-found: error

  build-jre:
    name: Build Minimal JRE (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            runner: windows-latest
            jre-download: 'https://github.com/adoptium/temurin21-binaries/releases/download/jdk21u.0.4-ga/OpenJDK21U-jdk_x64_windows_hotspot_21.0.4_7.zip'

          - os: macos-x64
            runner: macos-13
            jre-download: 'https://github.com/adoptium/temurin21-binaries/releases/download/jdk21u.0.4-ga/OpenJDK21U-jdk_x64_mac_hotspot_21.0.4_7.tar.gz'

          - os: macos-aarch64
            runner: macos-14
            jre-download: 'https://github.com/adoptium/temurin21-binaries/releases/download/jdk21u.0.4-ga/OpenJDK21U-jdk_aarch64_mac_hotspot_21.0.4_7.tar.gz'

          - os: linux
            runner: ubuntu-latest
            jre-download: 'https://github.com/adoptium/temurin21-binaries/releases/download/jdk21u.0.4-ga/OpenJDK21U-jdk_x64_linux_hotspot_21.0.4_7.tar.gz'

    steps:
      - name: Download JDK 21
        run: |
          mkdir -p jdk-download
          cd jdk-download
          echo "Downloading JDK 21 from Adoptium..."
          curl -L --fail --retry 3 -o jdk.tmp "${{ matrix.jre-download }}" 2>&1 | tail -3
          if [ ! -f jdk.tmp ]; then
            echo "ERROR: Download failed"
            exit 1
          fi
          echo "✓ Downloaded $(ls -lh jdk.tmp | awk '{print $5}')"
        shell: bash

      - name: Extract JDK
        run: |
          cd jdk-download
          if file jdk.tmp | grep -q "Zip"; then
            unzip -q jdk.tmp
          else
            tar -xzf jdk.tmp
          fi
          rm jdk.tmp
          
          # Flatten: move contents up one level
          JDK_DIR=$(find . -maxdepth 1 -type d ! -name "." | head -1)
          if [ -n "$JDK_DIR" ] && [ -d "$JDK_DIR" ]; then
            mv "$JDK_DIR"/* .
            rmdir "$JDK_DIR"
          fi
          
          echo "✓ JDK extracted and flattened"
          ls -1 bin | head -5
        shell: bash

      - name: Build Minimal JRE with jlink
        run: |
          cd jdk-download
          echo "Building minimal JRE with jlink..."
          
          # Only include modules required for Spring Boot 3.1 + Java 21
          ./bin/jlink \
            --add-modules java.base,java.logging,java.net.http,java.management,java.naming,java.sql,java.transaction.xa,jdk.charsets \
            --strip-debug \
            --no-header-files \
            --no-man-pages \
            --compress=2 \
            --output minimal-jre
          
          if [ ! -d minimal-jre ]; then
            echo "ERROR: jlink failed to create minimal-jre"
            exit 1
          fi
          
          SIZE=$(du -sh minimal-jre | awk '{print $1}')
          echo "✓ Minimal JRE created: $SIZE"
        shell: bash

      - name: Package JRE Archive
        run: |
          cd jdk-download
          
          if [ "${{ runner.os }}" = "Windows" ]; then
            # Use tar on Windows (available in modern Windows)
            tar -czf ../minimal-jre-${{ matrix.os }}.tar.gz minimal-jre/
            ARCHIVE="../minimal-jre-${{ matrix.os }}.tar.gz"
          else
            tar -czf ../minimal-jre-${{ matrix.os }}.tar.gz minimal-jre/
            ARCHIVE="../minimal-jre-${{ matrix.os }}.tar.gz"
          fi
          
          SIZE=$(ls -lh "$ARCHIVE" | awk '{print $5}')
          echo "✓ Archive created: $SIZE"
        shell: bash

      - name: Upload Minimal JRE
        uses: actions/upload-artifact@v4
        with:
          name: minimal-jre-${{ matrix.os }}
          path: minimal-jre-${{ matrix.os }}.tar.gz
          retention-days: 1
          if-no-files-found: error

  build-desktop:
    name: Build Desktop App (${{ matrix.os }}-${{ matrix.arch }})
    needs: [build-backend, build-jre]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            jre-os: windows

          - os: macos
            arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            jre-os: macos-x64

          - os: macos
            arch: aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            jre-os: macos-aarch64

          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            jre-os: linux

    steps:
      - uses: actions/checkout@v4

      - name: Download Backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-jar

      - name: Download Minimal JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre-${{ matrix.jre-os }}
          path: jre-archive

      - name: Prepare Sidecar
        run: |
          mkdir -p frontend/src-tauri/sidecar
          
          # Extract JAR
          JAR=$(find backend-jar -name "*-exec.jar" | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No exec JAR found"
            ls -la backend-jar/
            exit 1
          fi
          
          cp "$JAR" frontend/src-tauri/sidecar/backend.jar
          echo "✓ Backend JAR: $(ls -lh frontend/src-tauri/sidecar/backend.jar | awk '{print $5}')"
          
          # Extract JRE
          cd jre-archive
          if [ -f "minimal-jre-${{ matrix.jre-os }}.tar.gz" ]; then
            tar -xzf "minimal-jre-${{ matrix.jre-os }}.tar.gz"
          else
            echo "ERROR: JRE archive not found"
            ls -la .
            exit 1
          fi
          
          if [ ! -d minimal-jre ]; then
            echo "ERROR: JRE extraction failed"
            exit 1
          fi
          
          mv minimal-jre ../frontend/src-tauri/sidecar/jre
          cd ..
          
          JRE_SIZE=$(du -sh frontend/src-tauri/sidecar/jre | awk '{print $1}')
          echo "✓ JRE: $JRE_SIZE"
          echo "✓ Total sidecar: $(du -sh frontend/src-tauri/sidecar | awk '{print $1}')"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci --no-audit --no-fund 2>&1 | tail -3

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Desktop App
        run: |
          cd frontend/src-tauri
          cargo tauri build --target ${{ matrix.target }} 2>&1 | tail -20

      - name: Verify Installer
        run: |
          BUNDLE="frontend/src-tauri/target/${{ matrix.target }}/release/bundle"
          
          echo "Checking for installers..."
          find "$BUNDLE" -type f '(' -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" ')' -exec ls -lh {} +
          
          INSTALLERS=$(find "$BUNDLE" -type f '(' -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" ')' 2>/dev/null | wc -l)
          if [ "$INSTALLERS" -lt 1 ]; then
            echo "ERROR: No installers found in $BUNDLE"
            find "$BUNDLE" -type f | head -20
            exit 1
          fi
          echo "✓ Found $INSTALLERS installer(s)"
        shell: bash

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          path: frontend/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 1
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Collect Installers
        run: |
          mkdir -p release
          
          find installers -type f '(' -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" ')' -exec cp {} release/ +
          
          if [ ! "$(ls -A release/ 2>/dev/null)" ]; then
            echo "ERROR: No installers collected"
            find installers -type f | head -20
            exit 1
          fi
          
          cd release
          sha256sum * > CHECKSUMS.sha256
          echo "✓ Release ready:"
          ls -lh
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body: |
            # OpenTron v${{ github.ref_name }}
            
            **Production-ready cross-platform desktop application. Zero external dependencies.**
            
            ## 🚀 Download & Install
            
            ### Windows
            - **OpenTron.msi** - Standard installer
            - **OpenTron.exe** - Portable executable
            
            ### macOS
            - **OpenTron-x86_64.dmg** - Intel Macs (10.15+)
            - **OpenTron-aarch64.dmg** - Apple Silicon (11.0+)
            
            ### Linux
            - **OpenTron.AppImage** - Universal (glibc 2.29+)
            - **OpenTron.deb** - Debian/Ubuntu (18.04+)
            
            ## ✨ Bundled
            
            ✅ Java 21 Runtime (Minimal JRE ~50MB)
            ✅ Spring Boot 3.1 Backend
            ✅ React 19 + Tauri Frontend
            ✅ PostgreSQL Support
            ✅ 6 AI Agents + 14 Connectors
            ✅ Zero External Dependencies
            
            ## 📥 Installation
            
            **Windows:** Double-click `.msi`
            **macOS:** Mount `.dmg` and drag to Applications
            **Linux AppImage:** `chmod +x OpenTron.AppImage && ./OpenTron.AppImage`
            **Linux DEB:** `sudo dpkg -i OpenTron.deb`
            
            ## 🔒 Verify
            
            ```bash
            sha256sum -c CHECKSUMS.sha256
            ```
