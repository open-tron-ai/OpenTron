name: Build Desktop App Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-jar:
    name: Build Backend JAR (H2 Embedded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd java/opentron-java/backend
          mvn clean package -DskipTests=true -q
          JAR=$(ls -t target/*-exec.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR built"
            exit 1
          fi
          cp "$JAR" /tmp/backend.jar
        shell: bash

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: /tmp/backend.jar
          retention-days: 1

  build-minimal-jre:
    name: Build Minimal JRE
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Minimal JRE with jlink
        run: |
          JAVA_HOME="${{ env.JAVA_HOME }}"
          $JAVA_HOME/bin/jlink \
            --add-modules java.base,java.logging,java.net.http,java.management,java.naming,java.sql,java.transaction.xa,java.security.jgss,jdk.charsets \
            --strip-debug --no-header-files --no-man-pages --compress=2 \
            --output /tmp/minimal-jre
        shell: bash

      - name: Archive JRE
        run: |
          cd /tmp && tar -czf minimal-jre.tar.gz minimal-jre/
        shell: bash

      - name: Upload JRE
        uses: actions/upload-artifact@v4
        with:
          name: minimal-jre
          path: /tmp/minimal-jre.tar.gz
          retention-days: 1

  build-desktop-windows:
    name: Build Desktop (Windows)
    needs: [build-jar, build-minimal-jre]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar
        run: |
          mkdir frontend\src-tauri\sidecar
          copy backend-download\backend.jar frontend\src-tauri\sidecar\
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          move minimal-jre ..\frontend\src-tauri\sidecar\jre
        shell: cmd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Desktop
        run: |
          cd frontend
          npm ci --no-audit --no-fund
          npm run build
          npm run tauri build
        shell: cmd

      - name: Copy Installers
        run: |
          mkdir dist
          for /r "frontend\src-tauri\target\x86_64-pc-windows-msvc\release\bundle" %%F in (*.msi *.exe) do copy "%%F" dist\
        shell: cmd

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build-desktop-windows
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
          draft: false
          body: OpenTron v${{ github.ref_name }} - Production desktop app, zero dependencies
