name: Build Desktop App Installers (Production)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-bundle:
    name: Build & Bundle (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc

          - os: macos
            arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin

          - os: macos
            arch: aarch64
            runner: macos-14
            target: aarch64-apple-darwin

          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend JAR
        run: |
          cd java/opentron-java/backend
          mvn clean package -DskipTests=true -q
          JAR=$(ls target/*.jar | grep -E "exec|standalone" | head -1)
          if [ ! -f "$JAR" ]; then
            JAR=$(ls target/*.jar | head -1)
          fi
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
        shell: bash
        id: build_jar

      - name: Copy JAR to Sidecar
        run: |
          mkdir -p frontend/src-tauri/sidecar
          cp "${{ steps.build_jar.outputs.jar_path }}" frontend/src-tauri/sidecar/backend.jar
          ls -lh frontend/src-tauri/sidecar/
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci --no-audit --no-fund

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Desktop App
        run: |
          cd frontend/src-tauri
          cargo tauri build --target ${{ matrix.target }}
        shell: bash

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/
          retention-days: 1
          if-no-files-found: warn

  create-release:
    name: Create Release
    needs: build-and-bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Prepare Release Files
        run: |
          mkdir -p release
          find installers -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) -exec cp {} release/ \;
          
          if [ ! "$(ls -A release/)" ]; then
            echo "ERROR: No installers found!"
            find installers -type f | head -20
            exit 1
          fi
          
          cd release
          sha256sum * > CHECKSUMS.sha256
          ls -lh
          cat CHECKSUMS.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body: |
            # OpenTron v${{ github.ref_name }}
            
            **Ready-to-install desktop application with bundled Java backend.**
            
            ## Download & Install
            
            ### Windows
            - `OpenTron.msi` - Standard installer (recommended)
            - `OpenTron.exe` - Portable alternative
            
            ### macOS
            - `OpenTron-x86_64.dmg` - Intel Macs
            - `OpenTron-aarch64.dmg` - Apple Silicon (M1+)
            
            ### Linux
            - `OpenTron.AppImage` - Universal executable (x86_64)
            - `OpenTron.deb` - Debian/Ubuntu package
            
            ## Features
            
            ✅ Java 21 Spring Boot backend (bundled)
            ✅ AI agents & connectors (14+ integrations)
            ✅ PostgreSQL support
            ✅ No external dependencies required
            ✅ Cross-platform (Windows, macOS, Linux)
            
            ## Installation Instructions
            
            **Windows:** Double-click the .msi or .exe file
            **macOS:** Mount the .dmg and drag to Applications
            **Linux AppImage:** `chmod +x OpenTron.AppImage && ./OpenTron.AppImage`
            **Linux DEB:** `sudo dpkg -i OpenTron.deb`
            
            ## Verification
            
            ```bash
            sha256sum -c CHECKSUMS.sha256
            ```
