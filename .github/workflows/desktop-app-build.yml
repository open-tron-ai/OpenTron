name: Build Desktop App Installers (Production)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-bundle:
    name: Build & Bundle (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc

          - os: macos
            arch: x86_64
            runner: macos-13
            target: x86_64-apple-darwin

          - os: macos
            arch: aarch64
            runner: macos-14
            target: aarch64-apple-darwin

          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM JDK
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          cache: maven

      - name: Build Native Backend
        run: |
          cd java/opentron-java/backend
          PROFILE="native-$(echo "${{ matrix.os }}-${{ matrix.arch }}" | sed 's/-/_/g')"
          mvn -DskipTests=true -P"$PROFILE" clean package
        shell: bash

      - name: Find Native Binary
        id: native
        run: |
          cd java/opentron-java/backend/target
          BINARY=$(ls opentron-backend-* 2>/dev/null | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: Native binary not found"
            ls -la
            exit 1
          fi
          echo "binary=$BINARY" >> $GITHUB_OUTPUT
          echo "Found: $BINARY"
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Copy Native Binary to Sidecar
        run: |
          mkdir -p frontend/src-tauri/sidecar
          cp "java/opentron-java/backend/target/${{ steps.native.outputs.binary }}" \
             "frontend/src-tauri/sidecar/${{ steps.native.outputs.binary }}"
          ls -lh frontend/src-tauri/sidecar/
        shell: bash

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci --no-audit --no-fund

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Build Desktop App
        run: |
          cd frontend/src-tauri
          cargo tauri build --target ${{ matrix.target }}
        shell: bash

      - name: Find Installer
        id: installer
        run: |
          find frontend/src-tauri/target/${{ matrix.target }}/release/bundle -type f \
            \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) \
            | head -1 | xargs -I {} echo "path={}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/**/*(*.msi|*.exe|*.dmg|*.AppImage|*.deb)
          retention-days: 1

  create-release:
    name: Create Release
    needs: build-and-bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download All Installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Prepare Release Files
        run: |
          mkdir -p release
          find installers -type f \
            \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} release/ \;
          cd release
          sha256sum * > CHECKSUMS.sha256
          ls -lh
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body: |
            # Tron ${{ github.ref_name }}
            
            Ready-to-install desktop application with bundled native backend.
            
            ## Download
            
            - **Windows**: OpenTron.msi or OpenTron.exe
            - **macOS**: OpenTron-x86_64.dmg or OpenTron-aarch64.dmg
            - **Linux**: OpenTron.AppImage or OpenTron.deb
            
            ## Installation
            
            Just download and run. No Java or other dependencies needed.
