name: Build Desktop App Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-jar:
    name: Build Backend JAR (H2 Embedded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: |
          cd java/opentron-java/backend
          mvn clean package -DskipTests=true -q
          JAR=$(ls -t target/*-exec.jar 2>/dev/null | head -1)
          if [ -z "$JAR" ]; then
            echo "ERROR: No JAR built"
            exit 1
          fi
          cp "$JAR" /tmp/backend.jar
        shell: bash

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: /tmp/backend.jar
          retention-days: 1

  build-minimal-jre:
    name: Build Minimal JRE
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create Minimal JRE with jlink
        run: |
          JAVA_HOME="${{ env.JAVA_HOME }}"
          $JAVA_HOME/bin/jlink \
            --add-modules java.base,java.logging,java.net.http,java.management,java.naming,java.sql,java.transaction.xa,java.security.jgss,jdk.charsets \
            --strip-debug --no-header-files --no-man-pages --compress=2 \
            --output /tmp/minimal-jre
        shell: bash

      - name: Archive JRE
        run: |
          cd /tmp && tar -czf minimal-jre.tar.gz minimal-jre/
        shell: bash

      - name: Upload JRE
        uses: actions/upload-artifact@v4
        with:
          name: minimal-jre
          path: /tmp/minimal-jre.tar.gz
          retention-days: 1

  build-desktop-windows:
    name: Build Desktop (Windows)
    needs: [build-jar, build-minimal-jre]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-download

      - name: Download JRE
        uses: actions/download-artifact@v4
        with:
          name: minimal-jre
          path: jre-download

      - name: Setup Sidecar
        run: |
          mkdir frontend\src-tauri\sidecar
          copy backend-download\backend.jar frontend\src-tauri\sidecar\
          cd jre-download
          tar -xzf minimal-jre.tar.gz
          move minimal-jre ..\frontend\src-tauri\sidecar\jre
        shell: cmd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: NPM Install
        run: |
          cd frontend
          npm ci --no-audit --no-fund
        shell: cmd

      - name: TypeScript Compile
        run: |
          cd frontend
          npx tsc -b
        shell: cmd

      - name: Vite Build
        run: |
          cd frontend
          npx vite build --outDir dist
        shell: cmd

      - name: Tauri Build
        run: |
          cd frontend
          npm run tauri build
        shell: cmd

      - name: List Build Output
        run: |
          echo Looking for installers...
          for /r "frontend\src-tauri\target\x86_64-pc-windows-msvc\release\bundle" %%F in (*.msi) do echo Found MSI: %%F
          for /r "frontend\src-tauri\target\x86_64-pc-windows-msvc\release\bundle" %%F in (*.exe) do echo Found EXE: %%F
        shell: cmd

      - name: Upload MSI Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 1

      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: frontend/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build-desktop-windows
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: release
        continue-on-error: true

      - name: Download NSIS
        uses: actions/download-artifact@v4
        with:
          name: windows-nsis
          path: release
        continue-on-error: true

      - name: List Release Files
        run: |
          ls -la release/
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          body: |
            # OpenTron v${{ github.ref_name }}
            
            Production-ready desktop application with zero external dependencies.
            
            - Windows MSI installer
            - Windows NSIS portable executable
            - Includes Java 21 Runtime, Spring Boot backend with H2 database
            
            Simply download and run - no installation required.
