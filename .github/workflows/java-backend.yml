name: Java Backend CI

on:
  push:
    paths:
      - 'java/opentron-java/backend/**'
  pull_request:
    paths:
      - 'java/opentron-java/backend/**'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build backend
        run: mvn -f java/opentron-java/backend package -DskipTests
