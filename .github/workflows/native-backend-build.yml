name: Native Backend Build (Multi-Platform)

on:
  push:
    branches: [main, develop]
    paths:
      - 'java/opentron-java/backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'java/opentron-java/backend/**'
  workflow_dispatch:

jobs:
  build-native:
    name: Build Native (${{ matrix.os }} - ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            graalvm-version: '21'
            java-version: '21'

          # Linux ARM64
          - os: linux
            arch: aarch64
            runner: ubuntu-latest
            graalvm-version: '21'
            java-version: '21'

          # macOS x86_64
          - os: macos
            arch: x86_64
            runner: macos-13
            graalvm-version: '21'
            java-version: '21'

          # macOS ARM64 (Apple Silicon)
          - os: macos
            arch: aarch64
            runner: macos-14
            graalvm-version: '21'
            java-version: '21'

          # Windows x86_64
          - os: windows
            arch: x86_64
            runner: windows-latest
            graalvm-version: '21'
            java-version: '21'

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM JDK
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'graalvm-community'
          cache: maven
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GraalVM Installation
        run: |
          java -version
          native-image --version
        shell: bash

      - name: Build Native Backend
        run: |
          cd java/opentron-java/backend
          mvn -DskipTests=true -Pnative-$(echo "${{ matrix.os }}-${{ matrix.arch }}" | tr '-' '-') clean package 2>&1 | tee build.log
          
          # Extract final result
          if grep -q "BUILD SUCCESS" build.log; then
            echo "BUILD_STATUS=SUCCESS" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=FAILURE" >> $GITHUB_ENV
          fi
        shell: bash

      - name: List Build Artifacts
        if: always()
        run: |
          ls -lah java/opentron-java/backend/target/ 2>/dev/null | grep -E "opentron-backend|\.exe|^d" || echo "No artifacts yet"
        shell: bash

      - name: Upload Native Binary Artifact
        if: env.BUILD_STATUS == 'SUCCESS'
        uses: actions/upload-artifact@v4
        with:
          name: native-binary-${{ matrix.os }}-${{ matrix.arch }}
          path: java/opentron-java/backend/target/opentron-backend-*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/') && env.BUILD_STATUS == 'SUCCESS'
        uses: softprops/action-gh-release@v2
        with:
          files: java/opentron-java/backend/target/opentron-backend-*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}

  verify-build:
    name: Verify Build Artifacts
    needs: build-native
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Downloaded Artifacts
        run: |
          find artifacts -type f -exec ls -lh {} \;
          echo "=== Summary ==="
          find artifacts -type f -name "opentron-backend-*" | sort

      - name: Check Binary Sizes
        run: |
          echo "Binary sizes:"
          find artifacts -type f -name "opentron-backend-*" -exec du -h {} \;
