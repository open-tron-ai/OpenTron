name: Release (Native Binaries + Desktop Apps)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true

jobs:
  build-all:
    name: Build Native Backends & Desktop Apps
    uses: ./.github/workflows/native-backend-build.yml

  build-desktop:
    name: Build Desktop Apps
    uses: ./.github/workflows/desktop-app-build.yml
    needs: build-all

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-all, build-desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Organize Release Assets
        run: |
          mkdir -p release/native-binaries release/apps
          
          # Organize native binaries
          find release-artifacts -name "native-binary-*" -type d -exec cp -r {}/opentron-backend-* release/native-binaries/ \;
          
          # Organize app bundles
          find release-artifacts -name "app-*" -type d -exec cp -r {} release/apps/ \;
          
          echo "=== Release Assets ==="
          find release -type f | sort

      - name: Generate Checksums
        run: |
          cd release
          find . -type f \( -name "opentron-backend-*" -o -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) -exec sha256sum {} \; > CHECKSUMS.sha256
          cat CHECKSUMS.sha256

      - name: Create Release Notes
        run: |
          cat > release/RELEASE_NOTES.md << 'EOF'
          # Release Notes
          
          ## Native Backends
          Platform-specific GraalVM native-image binaries included for immediate deployment:
          
          - **Linux x86_64**: `opentron-backend-linux-x86_64`
          - **Linux ARM64**: `opentron-backend-linux-aarch64`
          - **macOS x86_64**: `opentron-backend-macos-x86_64`
          - **macOS ARM64**: `opentron-backend-macos-aarch64`
          - **Windows x86_64**: `opentron-backend-windows-x86_64.exe`
          
          ## Desktop Apps
          Ready-to-run application bundles with native backends pre-installed:
          
          ### macOS
          - **Intel (x86_64)**: `app-macos-x86_64/*.dmg` - Universal app bundle
          - **Apple Silicon (ARM64)**: `app-macos-aarch64/*.dmg` - Native M1+ optimized
          
          ### Linux
          - **x86_64 AppImage**: `app-linux-x86_64/*.AppImage` - Single-file executable
          - **ARM64 DEB**: `app-linux-aarch64/*.deb` - Debian package for ARM systems
          
          ### Windows
          - **x86_64 EXE**: `app-windows-x86_64/*.exe` - MSI or standalone installer
          
          ## Features
          - ✅ GraalVM native backend (0.5-1.5s startup)
          - ✅ Java fallback (3-5s startup) if native not available
          - ✅ Live setup screen with real-time boot progress
          - ✅ Cross-platform support (macOS, Linux, Windows)
          - ✅ Multi-architecture support (x86_64, ARM64)
          
          ## Installation
          
          ### macOS
          ```bash
          # Download .dmg, double-click, drag to Applications
          ```
          
          ### Linux - AppImage
          ```bash
          chmod +x app-linux-x86_64/*.AppImage
          ./app-linux-x86_64/*.AppImage
          ```
          
          ### Linux - DEB
          ```bash
          sudo dpkg -i app-linux-aarch64/*.deb
          # Or use system package manager
          ```
          
          ### Windows
          ```bash
          # Download .exe or .msi, double-click to install
          ```
          
          ## Performance
          Desktop app now boots **2-4x faster** with bundled GraalVM native backend.
          
          ## Checksums
          See `CHECKSUMS.sha256` to verify downloaded files.
          EOF
          cat release/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/native-binaries/*
            release/apps/**/*.dmg
            release/apps/**/*.exe
            release/apps/**/*.msi
            release/apps/**/*.AppImage
            release/apps/**/*.deb
            release/CHECKSUMS.sha256
            release/RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body_path: release/RELEASE_NOTES.md

      - name: Upload Release Summary
        uses: actions/upload-artifact@v4
        with:
          name: release-summary
          path: |
            release/CHECKSUMS.sha256
            release/RELEASE_NOTES.md
