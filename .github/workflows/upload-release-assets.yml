name: Upload Release Assets

on:
  workflow_run:
    workflows: ["Native Backend Build (Multi-Platform)", "Desktop App Build"]
    types: [completed]
    branches: [main, develop]

jobs:
  upload-to-release:
    if: github.event.workflow_run.conclusion == 'success'
    name: Upload Artifacts to Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get Latest Release
        id: get-release
        run: |
          RELEASE=$(gh release list --limit 1 --json tagName,isDraft --jq '.[0]' 2>/dev/null || echo '{}')
          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          if [ "$RELEASE" != "{}" ]; then
            echo "Found release: $RELEASE"
          else
            echo "No release found - create one with: git tag v1.0.0 && git push origin v1.0.0"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Artifacts from Workflow
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          path: artifacts

      - name: List Downloaded Artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts -type f | head -20

      - name: Upload to Latest Release
        if: success()
        run: |
          echo "Uploading artifacts to release..."
          find artifacts -type f -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.msi" | while read file; do
            if [ -f "$file" ]; then
              echo "Uploading: $file"
              gh release upload --clobber $(gh release list --limit 1 --json tagName -q '.[0].tagName') "$file" 2>/dev/null || true
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List Release Assets
        run: |
          echo "=== Release Assets ==="
          gh release view $(gh release list --limit 1 --json tagName -q '.[0].tagName') 2>/dev/null | grep -E "\.exe|\.dmg|\.deb|\.AppImage|\.msi" || echo "No assets uploaded yet"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
