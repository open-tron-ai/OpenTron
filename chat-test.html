<!DOCTYPE html>
<html>
<head>
    <title>Tron Chat Test</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; }
        #messages { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .user { background: #e3f2fd; }
        .assistant { background: #f1f8e9; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>Tron Chat Test</h1>
    <div id="messages"></div>
    <input type="text" id="input" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>

    <script>
        const messagesDiv = document.getElementById('messages');
        const inputEl = document.getElementById('input');
        let messages = [];

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;
            
            inputEl.value = '';
            messages.push({ role: 'user', content: text });
            addMessage('user', text);
            
            try {
                const response = await fetch('http://localhost:8000/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'mistral',
                        messages: messages,
                        stream: true
                    })
                });
                
                if (!response.ok) throw new Error('HTTP ' + response.status);
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let assistantMsg = '';
                const msgEl = addMessage('assistant', '');
                
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, {stream: true});
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            try {
                                const chunk = JSON.parse(data);
                                const delta = chunk.choices?.[0]?.delta?.content;
                                if (delta) {
                                    assistantMsg += delta;
                                    msgEl.textContent = assistantMsg;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                messages.push({ role: 'assistant', content: assistantMsg });
            } catch (err) {
                addMessage('error', 'Error: ' + err.message);
            }
        }
        
        function addMessage(role, text) {
            const el = document.createElement('div');
            el.className = 'msg ' + role;
            el.textContent = text;
            messagesDiv.appendChild(el);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return el;
        }
        
        inputEl.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
