<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>

    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="frontend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <linearGradient id="db" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.25"/>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <text x="700" y="60"
        text-anchor="middle"
        fill="white"
        font-size="34"
        font-family="Segoe UI, Arial">
      OpenTron Architecture
  </text>

  <rect x="80" y="300" rx="22" ry="22"
        width="250" height="120"
        fill="url(#frontend)"
        filter="url(#shadow)"/>

  <text x="205" y="345" text-anchor="middle"
        fill="white" font-size="26"
        font-family="Segoe UI">
      React + Tauri
  </text>

  <text x="205" y="385" text-anchor="middle"
        fill="#dbeafe" font-size="18"
        font-family="Segoe UI">
      Frontend Shell
  </text>

  <rect x="450" y="120"
        rx="28" ry="28"
        width="500" height="520"
        fill="#111827"
        stroke="#10b981"
        stroke-width="3"/>

  <text x="700" y="170"
        text-anchor="middle"
        fill="#10b981"
        font-size="28"
        font-family="Segoe UI">
      OpenTron Orchestrator
  </text>

  <rect x="520" y="210" width="360" height="70" rx="16"
        fill="url(#engine)"/>
  <text x="700" y="255" text-anchor="middle"
        fill="white" font-size="24">
     10,000+ Virtual Threads
  </text>

  <rect x="520" y="310" width="360" height="70" rx="16"
        fill="#1f2937"/>
  <text x="700" y="355" text-anchor="middle"
        fill="white" font-size="22">
     Sandbox Execution
  </text>

  <rect x="520" y="410" width="360" height="70" rx="16"
        fill="#1f2937"/>
  <text x="700" y="455" text-anchor="middle"
        fill="white" font-size="22">
     Schema-Driven Protocols
  </text>

  <rect x="520" y="510" width="360" height="70" rx="16"
        fill="#1f2937"/>
  <text x="700" y="555" text-anchor="middle"
        fill="white" font-size="22">
     Regression Gatekeeper
  </text>

  <rect x="1060" y="250" width="260" height="120"
        rx="20" fill="url(#db)"
        filter="url(#shadow)"/>

  <text x="1190" y="295"
        text-anchor="middle"
        fill="white"
        font-size="22">
        PostgreSQL
  </text>

  <text x="1190" y="330"
        text-anchor="middle"
        fill="#ede9fe"
        font-size="18">
        Production Profile
  </text>

  <rect x="1060" y="420" width="260" height="120"
        rx="20" fill="url(#db)"
        opacity="0.85"/>

  <text x="1190" y="465"
        text-anchor="middle"
        fill="white"
        font-size="22">
        H2 File
  </text>

  <text x="1190" y="500"
        text-anchor="middle"
        fill="#ede9fe"
        font-size="18">
        Embedded Profile
  </text>

  <line x1="330" y1="360"
        x2="450" y2="360"
        stroke="#94a3b8"
        stroke-width="4"
        marker-end="url(#arrow)"/>

  <line x1="950" y1="360"
        x2="1060" y2="360"
        stroke="#94a3b8"
        stroke-width="4"
        marker-end="url(#arrow)"/>

</svg>
