server.port=8000
server.servlet.asyncRequestTimeout=180000
spring.mvc.async.request-timeout=180000
spring.main.banner-mode=off

# Engine/Ollama Configuration
engine.host=${ENGINE_HOST:http://127.0.0.1:11434}
engine.type=${ENGINE_TYPE:auto}
engine.apiKey=${ENGINE_APIKEY:}

# ==========================================
# PostgreSQL Configuration
# ==========================================
# Connection URL - uses POSTGRES_URL env var or defaults to localhost
spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/opentron}
spring.datasource.username=${POSTGRES_USER:opentron}
spring.datasource.password=${POSTGRES_PASSWORD:opentron_secure_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration (HikariCP)
# Maximum number of connections in the pool
spring.datasource.hikari.maximum-pool-size=20
# Minimum number of idle connections to maintain
spring.datasource.hikari.minimum-idle=5
# Maximum idle time (10 minutes)
spring.datasource.hikari.idle-timeout=600000
# Maximum lifetime of a connection (30 minutes)
spring.datasource.hikari.max-lifetime=1800000
# Connection timeout (30 seconds)
spring.datasource.hikari.connection-timeout=30000
# Enable auto-commit
spring.datasource.hikari.auto-commit=true
# Connection test query (optional)
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================
# JPA/Hibernate Configuration
# ==========================================
# ddl-auto options: validate, update, create, create-drop
# validate: only validates schema, doesn't create tables (recommended for production)
# update: updates schema if needed (use during development)
# create: creates schema, destroying previous data
# create-drop: creates schema and destroys on shutdown
spring.jpa.hibernate.ddl-auto=validate

# PostgreSQL dialect (using latest PostgreSQL dialect)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Batch insert optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Performance tuning
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.format_sql=false

# Connection properties
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ==========================================
# Flyway Configuration (Database Migrations)
# ==========================================
# Enable Flyway migrations
spring.flyway.enabled=true
# Location of migration files
spring.flyway.locations=classpath:db/migration
# Create baseline if needed
spring.flyway.baseline-on-migrate=true
# Out of order migration handling
spring.flyway.out-of-order=false

# ==========================================
# Voice/Jarvis Configuration
# ==========================================
voice.system=jarvis
voice.backend=local_ollama
voice.ollama-host=${VOICE_OLLAMA_HOST:http://localhost:11434}
voice.voice-id=jarvis
voice.model=neural-codec

# ==========================================
# DeepSeek API Configuration
# ==========================================
deepseek.api-key=

# ==========================================
# Actuator/Monitoring Configuration
# ==========================================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.timer.percentiles=0.5,0.75,0.95,0.99
management.metrics.web.server.request.autotime.enabled=true

# ==========================================
# Logging Configuration
# ==========================================
logging.level.root=INFO
logging.level.org.opentron.backend=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} : %msg%n
logging.file.name=logs/opentron-backend.log
logging.file.max-size=10MB
logging.file.max-history=10

# ==========================================
# Application Info
# ==========================================
spring.application.name=OpenTron Backend
app.version=0.1.0
app.description=AI-powered multi-agent orchestration system
