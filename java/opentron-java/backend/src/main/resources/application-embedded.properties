# H2 Embedded Database Profile (Zero External Dependencies)
spring.config.activate.on-profile=embedded

# H2 Configuration
spring.datasource.url=jdbc:h2:file:${user.home}/.opentron/opentron;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (useful for debugging, disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 Dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Schema auto-creation for embedded mode
spring.jpa.hibernate.ddl-auto=update

# Connection Pool - Optimized for single-user/embedded
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# Logging (development-friendly)
logging.level.root=INFO
logging.level.org.opentron.backend=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.h2.server=WARN
